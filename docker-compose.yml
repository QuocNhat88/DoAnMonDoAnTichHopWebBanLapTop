version: "3.8"

services:
  # 1. Dịch vụ AI Server (Python)
  ai_server:
    build: ./ai_server
    container_name: my-ai-server
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    restart: unless-stopped

  # 2. Dịch vụ Backend (Node.js)
  backend:
    build: ./backend
    container_name: my-backend
    ports:
      - "3000:3000"
    # Nếu file .env nằm ở thư mục gốc, dùng: ./.env
    # Nếu file .env nằm trong thư mục backend, dùng: ./backend/.env
    env_file:
      - ./.env
    restart: unless-stopped

  # 3. Dịch vụ Frontend (ReactJS / Nginx)
  frontend:
    build: ./frontend
    container_name: my-frontend
    ports:
      - "80:80" # Truy cập web ở máy thật qua http://localhost
    depends_on:
      - backend
    restart: unless-stopped
