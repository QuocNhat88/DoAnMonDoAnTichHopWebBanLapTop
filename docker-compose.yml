version: "3.8"

services:
  # 1. Dịch vụ AI Server (Python)
  ai_server:
    build: ./ai_server
    container_name: my-ai-server
    expose:
      - "8000" # Chỉ mở cổng 8000 bên trong mạng Docker, bên ngoài Internet không vào trực tiếp được nữa
    env_file:
      - ./.env
    restart: unless-stopped

  # 2. Dịch vụ Backend (Node.js)
  backend:
    build: ./backend
    container_name: my-backend
    expose:
      - "3000" # Chỉ mở cổng 3000 bên trong mạng Docker
    env_file:
      - ./.env
    restart: unless-stopped

  # 3. Dịch vụ Frontend (ReactJS / Nginx nội bộ)
  frontend:
    build: ./frontend
    container_name: my-frontend
    expose:
      - "80" # Chỉ mở cổng 80 nội bộ để Nginx trung tâm gọi vào
    depends_on:
      - backend
    restart: unless-stopped

  # 4. Dịch vụ NGINX TRUNG TÂM (Gateway)
  nginx_gateway:
    build: ./nginx
    container_name: my-nginx-gateway
    ports:
      - "80:80" # Chiếm duy nhất cổng 80 của VPS để hứng toàn bộ traffic từ Internet
    depends_on:
      - frontend
      - backend
      - ai_server
    restart: unless-stopped
