server {
    listen 80;
    
    # IP VPS
    server_name 103.72.56.192; 

    # 1. Điều phối về Frontend (Container frontend chạy nội bộ cổng 80)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Điều phối về Backend Node.js (Container backend chạy nội bộ cổng 3000)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Điều phối về AI Server Python (Container ai_server chạy nội bộ cổng 8000)
    location /ai/ {
        proxy_pass http://ai_server:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}